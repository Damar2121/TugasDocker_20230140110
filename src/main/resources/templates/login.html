<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 50px; }
        .login-box { background: white; padding: 20px; border: 1px solid #ccc; width: 300px; }
        input { width: 100%; margin-bottom: 15px; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-box">
    <h3>Login Page</h3>
    <p th:if="${error}" th:text="${error}" style="color: red; font-size: 14px;"></p>
    <form action="/login" method="post">
        <label>Username:</label>
        <input type="text" name="username" required>
        <label>Password:</label>
        <input type="password" name="password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
